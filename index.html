<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Project</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <h1>Test Project</h1>
      <ul>
        <li><a href="index.html#home">홈</a></li>
        <li><a href="index.html#about">소개</a></li>
        <li><a href="index.html#contact">연락처</a></li>
        <li><a href="lotto.html">로또 생성기</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="home" class="hero">
      <h2>환영합니다!</h2>
      <p>기본 HTML/CSS/JS 웹 프로젝트입니다.</p>
      <button id="action-btn">클릭하세요</button>
    </section>

    <section id="about" class="about">
      <h2>소개</h2>
      <p>이 프로젝트는 HTML, CSS, JavaScript로 구성된 기본 웹 프로젝트입니다.</p>
    </section>

    <section id="contact" class="contact">
      <h2>연락처</h2>
      <form id="contact-form">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" required>

        <label for="email">이메일</label>
        <input type="email" id="email" name="email" required>

        <label for="message">메시지</label>
        <textarea id="message" name="message" rows="4" required></textarea>

        <button type="submit">보내기</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Test Project. All rights reserved.</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
